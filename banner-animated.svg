<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a0a0f; }

      text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 8.5px;
        font-weight: bold;
        white-space: pre;
      }

      .r0 { fill: #ff0080; }
      .r1 { fill: #ff4040; }
      .r2 { fill: #ff8800; }
      .r3 { fill: #ffdd00; }
      .r4 { fill: #aaff00; }
      .r5 { fill: #00ffaa; }
      .r6 { fill: #00ccff; }
      .r7 { fill: #aa88ff; }

      .line { opacity: 0; }

      .line:nth-child(1)  { animation: fadeIn 0.4s ease forwards 0.1s; }
      .line:nth-child(2)  { animation: fadeIn 0.4s ease forwards 0.4s; }
      .line:nth-child(3)  { animation: fadeIn 0.4s ease forwards 0.7s; }
      .line:nth-child(4)  { animation: fadeIn 0.4s ease forwards 1.0s; }
      .line:nth-child(5)  { animation: fadeIn 0.4s ease forwards 1.3s; }
      .line:nth-child(6)  { animation: fadeIn 0.4s ease forwards 1.6s; }
      .line:nth-child(7)  { animation: fadeIn 0.4s ease forwards 1.9s; }
      .line:nth-child(8)  { animation: fadeIn 0.4s ease forwards 2.2s; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .glow-box {
        opacity: 0;
        animation: glowPulse 3s ease-in-out infinite 2.8s;
      }

      @keyframes glowPulse {
        0%,100% { opacity: 0.4; }
        50%      { opacity: 1; }
      }

      .subtitle {
        fill: #445566;
        font-family: 'Courier New', Courier, monospace;
        font-size: 9px;
        letter-spacing: 4px;
        opacity: 0;
        animation: fadeIn 1s ease forwards 2.6s;
      }
    </style>

    <!-- Glow filters -->
    <filter id="glow-pink" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="120" rx="6"/>

  <!-- Grid lines subtle -->
  <g stroke="rgba(0,200,255,0.04)" stroke-width="1">
    <line x1="0" y1="20" x2="900" y2="20"/>
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="120"/>
    <line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/>
    <line x1="500" y1="0" x2="500" y2="120"/>
    <line x1="600" y1="0" x2="600" y2="120"/>
    <line x1="700" y1="0" x2="700" y2="120"/>
    <line x1="800" y1="0" x2="800" y2="120"/>
  </g>

  <!-- ASCII Art lines — each row a different color, animated in sequence -->
  <text class="line r0" x="8" y="21"  filter="url(#glow-pink)">███████╗██╗  ██╗██╗██╗   ██╗██████╗  █████╗      ██╗ ██████╗  █████╗ ████████╗ █████╗ ██████╗ ███████╗</text>
  <text class="line r1" x="8" y="31" >██╔════╝██║  ██║██║██║   ██║██╔══██╗██╔══██╗     ██║ ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗██╔══██╗██╔════╝</text>
  <text class="line r2" x="8" y="41" >███████╗███████║██║██║   ██║██████╔╝███████║     ██║ ██████╔╝███████║   ██║   ███████║██████╔╝█████╗  </text>
  <text class="line r3" x="8" y="51" >╚════██║██╔══██║██║╚██╗ ██╔╝██╔══██╗██╔══██║██   ██║ ██╔═══╝ ██╔══██║   ██║   ██╔══██║██╔══██╗██╔══╝  </text>
  <text class="line r4" x="8" y="61" >███████║██║  ██║██║ ╚████╔╝ ██║  ██║██║  ██║╚█████╔╝ ██║     ██║  ██║   ██║   ██║  ██║██║  ██║███████╗</text>
  <text class="line r5" x="8" y="71"  filter="url(#glow-cyan)">╚══════╝╚═╝  ╚═╝╚═╝  ╚═══╝  ╚═╝  ╚═╝╚═╝  ╚═╝ ╚════╝  ╚═╝     ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝</text>

  <!-- Divider line -->
  <line class="line r6" x1="8" y1="82" x2="892" y2="82" stroke="#00ccff" stroke-width="0.5" opacity="0.5"/>

  <!-- Subtitle -->
  <text class="subtitle" x="50%" y="100" text-anchor="middle">// &lt; SHIVRAJ PATARE /&gt; — FULL STACK DEVELOPER</text>
</svg>
